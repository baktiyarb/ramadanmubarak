<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ramadan Mubarak BABYYYY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff7b00 0%, #f4d8bb 100%);
            color: #333;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .gif-container {
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 180px;
            height: auto;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #c2185b;
            font-weight: 700;
            line-height: 1.3;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }

        #yesBtn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .no-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 45%;
        }

        #noBtn {
            background: #f44336;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.2;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .success {
            display: none;
            animation: fadeIn 0.5s ease;
            text-align: center;
        }

        .success img {
            width: 200px;
            margin-bottom: 20px;
        }

        .success h2 {
            font-size: 1.5rem;
            color: #c2185b;
            animation: bounce 1s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .heart {
            position: fixed;
            font-size: 20px;
            animation: float 4s ease-in infinite;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="gif-container">
            <img src="ستيكر-متحركة-سبحه.gif" alt="Аю">
        </div>
        
        <h1>Ауыз ашарға шақырасың ба мені Досым?</h1>
        
        <div class="buttons">
            <button id="yesBtn">Әрине🤲</button>
            <div class="no-wrapper">
                <button id="noBtn">Жоқ</button>
            </div>
        </div>
    </div>

    <div class="success" id="successScreen">
        <img src="cat-orange-cat.gif" alt="Сүйісу">
        <h2>Ахахахаххаххах <br>Болды, күтем айтасыңғо</h2>
    </div>

    <script>
        let noCount = 0;
        let yesSize = 16;
        
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainContainer = document.getElementById('mainContainer');
        const successScreen = document.getElementById('successScreen');
        
        const noTexts = [
            "Noooo",
            "ҮЙЙЙ қой",
            "Точно ма",
            "Ойлан",
            "Тамыр Четам",
            "Ииии қой",
            "Щақрмайсыңғо ",
            "Whaaaaatttt",
            "Ренжим каз",
            "Емае",
            "Достыыыыы",
            "pleaseeeeeeeee",
            ":((((",
            "BUT I LOVE YOU",
            "babyyyyyy",
            "NoooooOOOOOO"
        ];
        
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            noCount++;
            
            // Текстті өзгерту
            const textIndex = Math.min(noCount, noTexts.length - 1);
            noBtn.textContent = noTexts[textIndex];
            
            // Жоқ кішірейеді (тек padding және font-size)
            const newSize = Math.max(10, 14 - noCount * 0.5);
            const newPadding = Math.max(5, 15 - noCount);
            
            noBtn.style.fontSize = newSize + 'px';
            noBtn.style.padding = `${newPadding}px ${newPadding}px`;
            
            // Иә үлкейеді
            yesSize += 15;
            yesBtn.style.fontSize = yesSize + 'px';3
            yesBtn.style.padding = (yesSize/1.2) + 'px ' + (yesSize * 1.2) + 'px';
            
            if (navigator.vibrate) navigator.vibrate(50);
        });
        
        yesBtn.addEventListener('click', function(e) {
            e.preventDefault();
            mainContainer.style.display = 'none';
            successScreen.style.display = 'block';
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            // Жүрек анимациясы
            const hearts = ['❤️', '💖', '💕', '💗', '💝'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 200);
        });
    </script>
</body>
</html>
